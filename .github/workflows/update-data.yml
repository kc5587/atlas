name: update-data
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: atlas } }
    env:
      GH_TOKEN: ${{ github.token }}
      ATLAS_SEC_USER_AGENT: ${{ secrets.ATLAS_SEC_USER_AGENT }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv venv && uv pip install -e ".[dev]"
      - run: uv run make all
      - run: uv run python scripts/publish_release.py

  deploy-web:
    needs: refresh
    if: always()                       # ship the site even if the data refresh failed
    runs-on: ubuntu-latest
    permissions: { pages: write, id-token: write, contents: read }
    environment: { name: github-pages }
    concurrency: { group: "pages", cancel-in-progress: true }
    defaults: { run: { working-directory: atlas } }
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/setup-node@v5
        with: { node-version: "24" }
      - run: uv venv && uv pip install -e ".[dev]"
      # Deploy from the last known-good published data release (not a live re-ingest), so
      # FRED/yfinance flakiness in `refresh` never blocks the site.
      - name: Fetch latest data release
        run: |
          mkdir -p data
          TAG=$(gh release list --json tagName,createdAt \
            --jq 'map(select(.tagName|startswith("data-")))|sort_by(.createdAt)|last|.tagName')
          test -n "$TAG" || { echo "no data-* release found"; exit 1; }
          echo "using data release $TAG"
          gh release download "$TAG" --pattern atlas.duckdb --dir data
      - run: uv run python web/export_data.py --db data/atlas.duckdb --out web/static/data
      - run: cd web && npm ci && npm run build
      - uses: actions/upload-pages-artifact@v3
        with: { path: atlas/web/dist }
      - uses: actions/deploy-pages@v4
