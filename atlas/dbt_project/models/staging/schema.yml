version: 2
models:
  - name: stg_prices
    columns:
      - name: ticker
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: close
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [ticker, date]
  - name: stg_macro
    columns:
      - name: series_id
        tests: [not_null]
      - name: value
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [series_id, date]
  - name: stg_fundamentals
    columns:
      - name: ticker
        tests: [not_null]
      - name: metric
        tests:
          - accepted_values:
              values: [revenue, capex, gross_margin]
      - name: value
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [cik, metric, period_end, accn]
