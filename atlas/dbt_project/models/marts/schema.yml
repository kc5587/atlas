version: 2
models:
  - name: prices_daily
    columns:
      - name: ticker
        tests: [not_null]
  - name: returns
    columns:
      - name: log_return
        tests: [not_null]
  - name: graph_nodes
    columns:
      - name: id
        tests: [not_null, unique]
      - name: stage
        tests:
          - accepted_values:
              values: [equipment, foundry, chips, cloud, power]
  - name: fundamentals_quarterly
    columns:
      - name: ticker
        tests: [not_null]
      - name: period_end
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [ticker, period_end]
  - name: vol_indices
    description: "Implied-vol index levels used by H6/H7."
    columns:
      - name: series
        tests: [not_null]
      - name: date
        tests: [not_null]
  - name: iv_snapshots
    description: "Accumulating single-name IV snapshot panel."
    columns:
      - name: ticker
        tests: [not_null]
      - name: date
        tests: [not_null]
